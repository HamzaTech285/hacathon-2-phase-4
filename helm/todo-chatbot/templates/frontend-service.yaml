apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "todo-chatbot.name" . }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
  selector:
    app.kubernetes.io/name: {{ include "todo-chatbot.name" . }}
    app.kubernetes.io/component: frontend
