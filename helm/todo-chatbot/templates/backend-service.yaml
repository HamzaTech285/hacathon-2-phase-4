apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "todo-chatbot.name" . }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "todo-chatbot.name" . }}
    app.kubernetes.io/component: backend
